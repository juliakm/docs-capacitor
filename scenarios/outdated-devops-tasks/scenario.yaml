detection:
  regex_rules: rules.yaml
  llm:
    prompt_template: prompts/detect.md.j2
    key_facts:
      - >-
          FULLY DEPRECATED TASKS (replaced by a different task, any reference is outdated):
          AndroidBuild@1 (use Gradle@4),
          CopyPublishBuildArtifacts@1 (use CopyFiles@2 + PublishBuildArtifacts@1),
          DotNetCoreInstaller@0 and @1 (use UseDotNet@2),
          NuGetPackager@0 (use NuGetCommand@2),
          NuGetPublisher@0 (use NuGetCommand@2),
          NuGetInstaller@0 (use NuGetAuthenticate@0),
          NuGetRestore@1 (use NuGetCommand@2),
          NuGet@0 (use NuGetCommand@2),
          VSMobileCenterTest@0 (use AppCenterTest@1),
          RunVisualStudioTestsusingTestAgent@1 (use VSTest@3),
          DeployVisualStudioTestAgent@1 and @2 (use VSTest@3),
          CondaEnvironment@0 and @1 (deprecated, use conda directly in script),
          AzureWebPowerShellDeployment@1 (deprecated Azure App Service Classic),
          IISWebAppDeployment@1 (use IISWebAppDeploymentOnMachineGroup@0),
          SqlServerDacpacDeployment@1 (deprecated),
          AzureMonitorAlerts@0 (deprecated),
          CacheBeta@0 and @1 (use Cache@2),
          NodeTool@0 (use UseNode@1),
          PyPIPublisher@0 (use TwineAuthenticate@1).
      - >-
          OUTDATED VERSIONS (newer version of the same task exists, any version
          lower than the current is outdated):
          PowerShell current=@2,
          AzurePowerShell current=@5,
          AzureCLI current=@2,
          AzureFileCopy current=@6,
          AzureRmWebAppDeployment current=@5,
          AzureFunctionApp current=@2,
          AzureKeyVault current=@2,
          AzureContainerApps current=@1,
          Docker current=@2,
          DockerCompose current=@1,
          DotNetCoreCLI current=@2,
          Gradle current=@4,
          Maven current=@4,
          Xcode current=@5,
          VSTest current=@3,
          AndroidSigning current=@3,
          AppCenterDistribute current=@3,
          ArchiveFiles current=@2,
          CmdLine current=@2,
          CopyFiles current=@2,
          cURLUploader current=@2,
          DownloadBuildArtifacts current=@1,
          DownloadPipelineArtifact current=@2,
          FileTransform current=@2,
          FtpUpload current=@2,
          GitHubRelease current=@1,
          HelmDeploy current=@1,
          HelmInstaller current=@1,
          InstallAppleCertificate current=@2,
          InstallAppleProvisioningProfile current=@1,
          InvokeRESTAPI current=@1,
          JavaToolInstaller current=@1,
          JenkinsDownloadArtifacts current=@2,
          JenkinsQueueJob current=@2,
          Kubernetes current=@1,
          KubernetesManifest current=@1,
          ManualValidation current=@1,
          Npm current=@1,
          NuGetAuthenticate current=@1,
          NuGetToolInstaller current=@1,
          PipAuthenticate current=@1,
          PowerShellOnTargetMachines current=@3,
          PublishCodeCoverageResults current=@2,
          PublishPipelineArtifact current=@1,
          PublishSymbols current=@2,
          PublishTestResults current=@2,
          PublishToAzureServiceBus current=@2,
          WindowsMachineFileCopy current=@2,
          TwineAuthenticate current=@1,
          AzureCloudPowerShellDeployment current=@2,
          AzureVmssDeployment current=@1,
          AzureFunctionOnKubernetes current=@1,
          AzureResourceGroupDeployment current=@2,
          gulp current=@1,
          PackerBuild current=@1,
          DownloadPackage current=@1,
          AzureFunction current=@2,
          SonarQubeAnalyze current=@8,
          SonarQubePrepare current=@8,
          SonarQubePublish current=@8.
      - "Any version LOWER than the listed current version is outdated. Example: if current=@2, then @0 and @1 are outdated."
      - "Some tasks have only one version and are NOT outdated (e.g., AzureLoadTest@1, Bash@3, MSBuild@1, Ant@1, CMake@1). Only flag versions where a newer version exists per the lists above."
      - "Skip articles in repos with 'archive' in the name."
      - "Match task references in YAML code blocks (e.g., 'task: PowerShell@1'), inline code, and narrative text."
      - "Reference: https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/reference/?view=azure-pipelines and https://github.com/MicrosoftDocs/azure-devops-yaml-schema/tree/main/task-reference"

    max_article_chars: 8000
    rate_limit_rpm: 10
    max_pages: 150

classification:
  strategy: strategy.yaml
  scope:
    product_patterns:
      - Azure DevOps

reporting:
  title: outdated-devops-tasks — Freshness Report
  formats:
    - markdown
    - csv
    - json
