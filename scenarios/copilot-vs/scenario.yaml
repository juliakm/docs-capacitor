name: Copilot VS Install Path
description: >
  Find Microsoft Learn articles that still reference the old Marketplace/Manage Extensions install path for GitHub
  Copilot in Visual Studio, which is now built-in since VS 2022 17.10+.
product:
  name: GitHub Copilot
  tool: Visual Studio
search:
  github:
    orgs:
      - MicrosoftDocs
      - dotnet
      - OfficeDev
      - mspnp
    queries:
      - '"Manage Extensions" copilot "Visual Studio"'
      - marketplace.visualstudio.com copilot "Visual Studio"
      - '"Tools" "Extensions" copilot "Visual Studio"'
      - '"install copilot" "Visual Studio"'
      - '"GitHub Copilot" extension "Visual Studio"'
      - '"GitHub Copilot" "Visual Studio" install'
      - '"GitHub Copilot" "agent mode" "Visual Studio"'
    excluded_repos:
      - MicrosoftDocs/visualstudio-docs
      - MicrosoftDocs/visualstudio-docs-pr
      - MicrosoftDocs/visualstudio-docs-archive-pr
      - MicrosoftDocs/azure-devops-docs-archive-pr
      - MicrosoftDocs/azure-databases-docs
      - MicrosoftDocs/businessapps-copilot-docs-pr
      - MicrosoftDocs/learn-bizapps-pr
      - MicrosoftDocs/mc-docs-pr
      - MicrosoftDocs/well-architected
      - dotnet/aspire
      - MicrosoftDocs/Agent-Skills
    tracker: tracker.json
  learn:
    api_url: https://learn.microsoft.com/api/search
    queries:
      - GitHub Copilot Visual Studio
      - GitHub Copilot install Visual Studio
      - Copilot agent mode Visual Studio
      - Copilot extension marketplace Visual Studio
      - GitHub Copilot chat Visual Studio
      - Copilot code completions Visual Studio
      - extension copilot Visual Studio
    path_scopes:
      - /en-us/visualstudio/
      - /en-us/azure/devops/
      - /en-us/dotnet/
      - /en-us/azure/developer/
      - /en-us/copilot/
      - /en-us/training/modules/
      - /en-us/windows/dev-environment/
      - ''
    exclude_url_patterns:
      - visual-studio-code
      - vs-code
      - vscode
url_filters:
  relevant:
    - /training/modules/
    - /training/paths/
    - /dotnet/
    - /visualstudio/
    - /azure/developer/
    - /azure/devops/
    - /nuget/
    - /aspnet/
    - /ssms/
    - /credentials/
  skip:
    - /copilot/microsoft-365/
    - /microsoft-365-copilot/
    - /microsoft-copilot-studio/
    - /copilot/security/
    - /copilot/overview
    - /copilot/manage-copilot
    - /copilot/faq
    - /copilot/privacy
    - /intune/
    - /power-apps/
    - /power-bi/
    - /fabric/
    - /shows/
    - /azure/copilot/
    - /office365/
    - /release-notes/
    - copilot-for-azure
    - /mcp-server/
    - deprecated
    - archived
    - retired
    - AGENTS.md
detection:
  regex_rules: rules.yaml
  llm:
    prompt_template: prompts/detect.md.j2
    key_facts:
      - GitHub Copilot is built into Visual Studio 2022 version 17.10 and later — no extension install needed.
      - The Manage Extensions dialog is NOT the correct install path for Copilot in VS 2022 17.10+.
      - For VS 2022 versions before 17.10, users DO still need to install the extension via Manage Extensions.
      - The Visual Studio Marketplace page for Copilot should not be cited as the install source for 17.10+.
      - Copilot features appear in the Edit menu or via Ctrl+/ in Visual Studio 2022 17.10+.
      - Copilot Free plan is available — no paid subscription required to start.
      - Visual Studio Installer is the correct install path for Copilot components.
      - "EXCEPTION: GitHub Copilot for Azure is a separate extension that IS still installed via the marketplace."
      - "Articles about 'Copilot for Azure' or the Azure extension are NOT outdated when they reference marketplace install."
      - "EXCEPTION: Articles about MCP (Model Context Protocol) servers — including setup, configuration, and example use cases — are NOT in scope for this review. MCP server content describes how AI tools interact with services like Azure DevOps; it is unrelated to how Copilot is installed in Visual Studio."
    max_article_chars: 8000
    rate_limit_rpm: 10
classification:
  strategy: strategy.yaml
  scope:
    product_patterns:
      - github\s+copilot
      - \bcopilot\b
    tool_patterns:
      - visual\s+studio\b(?!\s*code)
release_notes:
  url: https://learn.microsoft.com/en-us/visualstudio/releases/2026/release-notes
  section_pattern: \bcopilot\b
  section_key: product_sections
reporting:
  title: Copilot VS — Documentation Freshness Report
  formats:
    - markdown
    - csv
    - json
