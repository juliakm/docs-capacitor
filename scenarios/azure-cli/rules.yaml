# Azure CLI — Regex Detection Rules
# Patterns that flag potentially outdated Azure CLI command references.

filters:
  include:
    url_regex:
      - 'learn\.microsoft\.com'
      - 'github\.com/MicrosoftDocs'
      - 'github\.com/Azure'
  exclude:
    url_regex:
      - 'release-notes-azure-cli'
      - 'release-notes'

rules:
  - id: DEPRECATED_ACS
    title: "References deprecated az acs commands (replaced by az aks)"
    severity: P0
    match:
      any_regex:
        - '(?i)\baz\s+acs\s+(create|scale|delete|list|show|browse)\b'
        - '(?i)\baz\s+acs\s+kubernetes\b'
        - '(?i)\baz\s+acs\s+dcos\b'
        - '(?i)\baz\s+acs\s+swarm\b'
    unless:
      any_regex:
        - '(?i)deprecated'
        - '(?i)replaced\s+by.*az\s+aks'
        - '(?i)no\s+longer\s+supported'

  - id: OLD_LOGIN
    title: "Uses deprecated az login --username password authentication"
    severity: P0
    match:
      any_regex:
        - '(?i)\baz\s+login\s+--username\b'
        - '(?i)\baz\s+login\s+-u\s+'
        - '(?i)\baz\s+login\s+--username\s+.*--password\b'
    unless:
      any_regex:
        - '(?i)deprecated'
        - '(?i)no\s+longer\s+recommended'
        - '(?i)use\s+.*device\s+code'
        - '(?i)use\s+.*managed\s+identity'

  - id: DEPRECATED_WEBAPP_LOG
    title: "Uses old az webapp log tail positional syntax"
    severity: INFO
    match:
      any_regex:
        - '(?i)\baz\s+webapp\s+log\s+tail\s+(?!-)[A-Za-z0-9_-]+\s+'
        - '(?i)\baz\s+webapp\s+log\s+tail\b(?!.*--name)'
    unless:
      any_regex:
        - '(?i)--name\s+'
        - '(?i)--resource-group\s+'
        - '(?i)-n\s+'
        - '(?i)-g\s+'

  - id: OLD_IMAGE_FORMAT
    title: "Uses old image alias format instead of URN for az vm create"
    severity: P0
    match:
      any_regex:
        - '(?i)\baz\s+vm\s+create\b.*--image\s+(UbuntuLTS|CentOS|Debian|openSUSE-Leap|RHEL|SLES|Win2019Datacenter|Win2016Datacenter|Win2012R2Datacenter|Win2012Datacenter)\b'
    unless:
      any_regex:
        - '(?i)deprecated'
        - '(?i)use\s+urn\s+format'
        - '(?i)publisher:offer:sku:version'
