name: vs-versionless-branding
description: |
  Looking for the use of Visual Studio with a number afterwards. We want it to use "Visual Studio" unless certain conditions are met. Visual Studio 2022 can be used if that's genuinely limited to that version.
product:
  name: Visual Studio
