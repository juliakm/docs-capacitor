url_filters:
  relevant: []
  skip:
    - /release-notes/
    - /whats-new/
    - /whats-happening
    - /changelog
    - /version-history
    - /release-history
    - github.com/Azure/
    - deprecated
    - archived
    - retired
    - /en-us/sql/tools/whats-happening
detection:
  regex_rules: rules.yaml
  llm:
    prompt_template: prompts/detect.md.j2
    key_facts:
      - Use the name "Visual Studio" without the year unless the context is that the specific version of Visual Studio is required
      - Most of the time, "Visual Studio" will be the name listed
      - If the content is about a deprecated, retired, or archived version of Visual Studio, it should not be flagged because we do not want to update old content that is no longer maintained. However, if the content is actively maintained and references a specific version of Visual Studio without a valid reason, it should be flagged for review.
    max_article_chars: 8000
    rate_limit_rpm: 10
classification:
  strategy: strategy.yaml
  scope:
    product_patterns:
      - \[Visual Studio(?!\s+Code)(?:\s+\d{4})?\]\([^)]+\)|\bVisual Studio(?!\s+Code)(?:\s+\d{4})?\b|\bVS\s+\d{4}\b
reporting:
  title: vs-versionless-branding — Freshness Report
  formats:
    - markdown
    - csv
    - json
