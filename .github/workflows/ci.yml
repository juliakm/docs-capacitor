name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: python3 -m pytest tests/ -v

  extension:
    name: Extension Lint & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install extension dependencies
        run: npm --prefix extension ci

      - name: Typecheck extension
        run: npm --prefix extension run lint

      - name: Package VSIX (validation)
        run: npm --prefix extension run package
